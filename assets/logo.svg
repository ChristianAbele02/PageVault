<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 140" width="420" height="140">
  <defs>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8913a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4a843;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="spineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7a5c3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9b6e42;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8d9c4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5efe6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1a1008" flood-opacity="0.35"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background pill -->
  <rect x="0" y="0" width="420" height="140" rx="16" fill="#1a1008"/>

  <!-- Subtle texture lines -->
  <line x1="0" y1="20" x2="420" y2="20" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>
  <line x1="0" y1="120" x2="420" y2="120" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>

  <!-- ── OPEN BOOK ICON ── -->
  <g transform="translate(20, 20)" filter="url(#shadow)">
    <!-- Cover spread -->
    <path d="M50 22 Q20 16 6 14 Q10 52 16 86 Q34 92 50 87 Q66 92 84 86 Q90 52 94 14 Q80 16 50 22 Z"
          fill="url(#bookGrad)"/>
    <!-- Pages -->
    <path d="M50 27 Q24 21 10 19 Q14 52 19 82 Q35 88 50 83 Z" fill="url(#pageGrad)"/>
    <path d="M50 27 Q76 21 90 19 Q86 52 81 82 Q65 88 50 83 Z" fill="url(#pageGrad)"/>
    <!-- Page lines -->
    <g stroke="#c4a882" stroke-opacity="0.6" stroke-width="1.4" stroke-linecap="round">
      <line x1="17" y1="35" x2="43" y2="36"/>
      <line x1="17" y1="44" x2="43" y2="45"/>
      <line x1="17" y1="53" x2="43" y2="54"/>
      <line x1="17" y1="62" x2="43" y2="63"/>
      <line x1="57" y1="36" x2="83" y2="35"/>
      <line x1="57" y1="45" x2="83" y2="44"/>
      <line x1="57" y1="54" x2="83" y2="53"/>
      <line x1="57" y1="63" x2="83" y2="62"/>
    </g>
    <!-- Gutter -->
    <line x1="50" y1="27" x2="50" y2="84" stroke="#2a1c0e" stroke-opacity="0.35" stroke-width="1.6"/>
    <!-- Rim light -->
    <path d="M50 27 Q24 21 10 19" fill="none" stroke="#fffaf0" stroke-opacity="0.5" stroke-width="1.4"/>
    <path d="M50 27 Q76 21 90 19" fill="none" stroke="#fffaf0" stroke-opacity="0.5" stroke-width="1.4"/>
    <!-- Bookmark ribbon -->
    <path d="M46 23 L54 23 L53 100 L50 93 L47 100 Z" fill="#9b3a1c"/>
  </g>

  <!-- ── WORDMARK ── -->
  <text x="138" y="70"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="48"
    font-weight="bold"
    letter-spacing="-1"
    fill="#f5efe6">Page</text>
  <text x="138" y="70"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="48"
    font-weight="bold"
    letter-spacing="-1"
    fill="none"
    stroke="#f5efe6"
    stroke-width="0.5"
    dx="104">Vault</text>
  <text x="242" y="70"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="48"
    font-weight="bold"
    letter-spacing="-1"
    fill="url(#bookGrad)">Vault</text>

  <!-- Tagline -->
  <text x="139" y="96"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="13"
    font-weight="300"
    letter-spacing="3.5"
    fill="#d4a843"
    fill-opacity="0.75">YOUR PERSONAL BOOK VAULT</text>

  <!-- Subtle decorative line under tagline -->
  <line x1="139" y1="104" x2="380" y2="104" stroke="#d4a843" stroke-width="0.5" stroke-opacity="0.2"/>

</svg>
