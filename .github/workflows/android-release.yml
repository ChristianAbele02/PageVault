name: Android Release

# Builds the Android APK. Runs on version tags (attaching the APK to the GitHub
# release) and on manual dispatch.
#
# Signing is optional: provide ANDROID_KEYSTORE_BASE64 (base64 of the release
# keystore) together with ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS and
# ANDROID_KEY_PASSWORD as repository secrets. Without them the APK falls back to
# a debug signature: it still installs, but Android only updates an app over the
# SAME key, so configure the keystore before distributing widely.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the APK file name (e.g. 1.9.0)"
        required: false

permissions:
  contents: write

jobs:
  apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      # Chaquopy compiles the bundled Python source with a build interpreter of
      # the same minor version as the target (3.13 in app/build.gradle).
      - name: Set up Python 3.13
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Resolve version
        id: ver
        run: |
          v="${{ github.event.inputs.version }}"
          if [ -z "$v" ]; then v="${GITHUB_REF_NAME#v}"; fi
          if [ -z "$v" ]; then v="0.0.0"; fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Building version $v"

      - name: Decode release keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/release.keystore
          echo "ANDROID_KEYSTORE_FILE=release.keystore" >> "$GITHUB_ENV"

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --console=plain

      - name: Name the APK
        run: |
          mkdir -p release_output
          cp android/app/build/outputs/apk/release/app-release.apk \
             "release_output/PageVault-${{ steps.ver.outputs.version }}.apk"

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: pagevault-android-${{ steps.ver.outputs.version }}
          path: release_output/*

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: release_output/*
