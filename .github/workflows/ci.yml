name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev,prod]"

      - name: Run tests
        run: pytest -v

      - name: UI marker smoke check
        run: |
          python - <<'PY'
          from pathlib import Path

          index_html = Path('templates/index.html').read_text(encoding='utf-8')
          stats_html = Path('templates/stats.html').read_text(encoding='utf-8')

          required_index = ['io-last-job', 'csv-wizard-file', 'restore-file', 'goal-progress', 'session-summary']
          required_stats = ['kpi-goal-books', 'kpi-pages-day', 'copy-range-link']

          missing = [marker for marker in required_index if marker not in index_html]
          missing += [marker for marker in required_stats if marker not in stats_html]
          if missing:
              raise SystemExit(f'Missing required UI markers: {missing}')
          print('UI marker smoke check passed.')
          PY

  coverage:
    name: Coverage (Python 3.12)
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev,prod]"
      - name: Run coverage gate
        run: pytest --cov=app --cov=pagevault_core --cov-report=xml --cov-report=term-missing --cov-fail-under=75
      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ env.CODECOV_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Check formatting
        run: ruff format --check .
      - name: Lint
        run: ruff check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Run mypy
        run: mypy app.py pagevault_core

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker image
        run: docker build -t pagevault:ci .
      - name: Smoke test container
        run: |
          docker run -d -p 5000:5000 --name pv_test pagevault:ci
          sleep 10
          curl -f http://localhost:5000/ || (docker logs pv_test && exit 1)
          curl -f http://localhost:5000/stats || (docker logs pv_test && exit 1)
          curl -f http://localhost:5000/api/stats || (docker logs pv_test && exit 1)
          curl -f http://localhost:5000/static/manifest.webmanifest || (docker logs pv_test && exit 1)
          docker stop pv_test
