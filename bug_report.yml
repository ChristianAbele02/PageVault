name: 🐛 Bug Report
description: Something isn't working as expected
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out this form as completely as possible.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I scan an ISBN, the app crashes with..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Open PageVault at localhost:5000
        2. Click the + button
        3. Scan ISBN ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages or screenshots.
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python Version
      placeholder: "e.g. 3.12.1"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. macOS 14.4, Ubuntu 24.04, Windows 11"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser (if UI-related)
      placeholder: "e.g. Chrome 124, Firefox 125, Safari 17"

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant terminal output or browser console errors.
      render: shell
