<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920" role="img" aria-label="PageVault desktop application in dark mode">
  <defs>
    <linearGradient id="bgd" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1a130a"/><stop offset="1" stop-color="#120c06"/>
    </linearGradient>
    <linearGradient id="bookd" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#7a5a3c"/><stop offset="1" stop-color="#3d2a1a"/>
    </linearGradient>
    <linearGradient id="progressd" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#c8913a"/><stop offset="1" stop-color="#5c7a5e"/>
    </linearGradient>
    <clipPath id="winclipd"><rect x="70" y="48" width="1260" height="826" rx="16"/></clipPath>
    <filter id="wsd" x="-10%" y="-10%" width="120%" height="128%">
      <feDropShadow dx="0" dy="14" stdDeviation="24" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="1400" height="920" fill="#060403"/>
  <circle cx="1200" cy="170" r="340" fill="#c8913a" opacity="0.05"/>
  <circle cx="210" cy="780" r="280" fill="#5c7a5e" opacity="0.06"/>

  <g filter="url(#wsd)">
    <g clip-path="url(#winclipd)">
      <rect x="70" y="48" width="1260" height="826" fill="url(#bgd)"/>

      <!-- native title bar -->
      <rect x="70" y="48" width="1260" height="52" fill="#080502"/>
      <text x="100" y="81" fill="#d4a843" font-size="21" font-family="Georgia,serif" font-weight="700">📚 Page<tspan fill="#fff" font-style="italic">Vault</tspan></text>
      <rect x="258" y="61" width="168" height="26" rx="13" fill="#1c130b"/>
      <text x="342" y="79" text-anchor="middle" fill="#caa86a" font-size="13" font-family="Arial,sans-serif" font-weight="700">DESKTOP · OFFLINE</text>
      <text x="1212" y="82" fill="#8a7d66" font-size="22" font-family="Arial,sans-serif">&#8211;</text>
      <rect x="1256" y="66" width="15" height="15" rx="2" fill="none" stroke="#8a7d66" stroke-width="2"/>
      <text x="1296" y="84" fill="#d4694f" font-size="20" font-family="Arial,sans-serif">&#10005;</text>

      <!-- stats bar -->
      <rect x="70" y="100" width="1260" height="48" fill="#0f0b05"/>
      <text x="108" y="130" fill="#e9dcc6" font-size="18" font-family="Arial,sans-serif">📚 128 books</text>
      <text x="320" y="130" fill="#e9dcc6" font-size="18" font-family="Arial,sans-serif">✅ 43 read</text>
      <text x="500" y="130" fill="#e9dcc6" font-size="18" font-family="Arial,sans-serif">📖 12 reading</text>
      <text x="710" y="130" fill="#e9dcc6" font-size="18" font-family="Arial,sans-serif">⭐ 4.3 avg</text>
      <rect x="1066" y="112" width="228" height="26" rx="13" fill="#3a4f3c"/>
      <text x="1180" y="130" text-anchor="middle" fill="#e7f0e6" font-size="13" font-family="Arial,sans-serif" font-weight="700">No Python · No browser tab</text>

      <!-- filters -->
      <g font-family="Arial,sans-serif" font-size="16">
        <rect x="108" y="176" width="280" height="42" rx="9" fill="#241a10" stroke="#3f2e1c"/><text x="124" y="203" fill="#cbb59a">All status</text>
        <rect x="404" y="176" width="280" height="42" rx="9" fill="#241a10" stroke="#3f2e1c"/><text x="420" y="203" fill="#cbb59a">All authors</text>
        <rect x="700" y="176" width="280" height="42" rx="9" fill="#241a10" stroke="#3f2e1c"/><text x="716" y="203" fill="#cbb59a">All genres</text>
        <rect x="996" y="176" width="298" height="42" rx="9" fill="#c8913a"/><text x="1012" y="203" fill="#1a1008" font-weight="700">📖 Continue reading</text>
      </g>

      <!-- hero book -->
      <g transform="translate(108,256)">
        <rect width="176" height="262" rx="8" fill="url(#bookd)"/>
        <rect x="8" y="8" width="160" height="246" rx="6" fill="none" stroke="rgba(255,255,255,.16)"/>
        <rect x="124" y="12" width="44" height="22" rx="4" fill="#5c7a5e"/>
        <text x="146" y="27" text-anchor="middle" fill="#fff" font-size="10" font-family="Arial,sans-serif" font-weight="700">READING</text>
        <text x="18" y="196" fill="#f3dfc0" font-size="22" font-family="Georgia,serif" font-weight="700">The Great</text>
        <text x="18" y="224" fill="#f3dfc0" font-size="22" font-family="Georgia,serif" font-weight="700">Gatsby</text>
      </g>
      <g transform="translate(312,262)">
        <text x="0" y="24" fill="#f3e7d4" font-size="25" font-family="Georgia,serif" font-weight="700">The Great Gatsby</text>
        <rect x="0" y="42" width="360" height="10" rx="5" fill="#3a2e20"/>
        <rect x="0" y="42" width="224" height="10" rx="5" fill="url(#progressd)"/>
        <text x="0" y="72" fill="#b29b7e" font-size="14" font-family="Arial,sans-serif">Page 112 of 180 (62.2%)</text>
        <text x="0" y="100" fill="#c4a781" font-size="17" font-family="Arial,sans-serif">F. Scott Fitzgerald</text>
        <text x="0" y="130" fill="#d4a843" font-size="18" font-family="Arial,sans-serif">★★★★☆ <tspan fill="#9f8567" font-size="14">4.3</tspan></text>
      </g>

      <!-- shelf -->
      <g transform="translate(108,560)">
        <rect width="176" height="262" rx="8" fill="#5a4029"/>
        <rect x="204" width="176" height="262" rx="8" fill="#3f5743"/>
        <rect x="408" width="176" height="262" rx="8" fill="#742f1c"/>
        <rect x="612" width="176" height="262" rx="8" fill="#352014"/>
        <rect x="816" width="176" height="262" rx="8" fill="#63482b"/>
        <rect x="1020" width="176" height="262" rx="8" fill="#496149"/>
      </g>
    </g>
    <rect x="70" y="48" width="1260" height="826" rx="16" fill="none" stroke="#2c2014" stroke-width="1.5"/>
  </g>
</svg>
