<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920" role="img" aria-label="PageVault library screenshot with example book">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fdf8f2"/>
      <stop offset="1" stop-color="#f2e7d8"/>
    </linearGradient>
    <linearGradient id="book" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#8f6a47"/>
      <stop offset="1" stop-color="#4f3824"/>
    </linearGradient>
    <linearGradient id="progress" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#c8913a"/>
      <stop offset="1" stop-color="#5c7a5e"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="920" fill="url(#bg)"/>

  <rect x="0" y="0" width="1400" height="78" fill="#2a1a0f"/>
  <text x="42" y="49" fill="#d4a843" font-size="34" font-family="Georgia,serif" font-weight="700">Page<tspan fill="#fff" font-style="italic">Vault</tspan></text>
  <rect x="1120" y="22" width="232" height="34" rx="16" fill="#3d2a1b" stroke="#6c4f35"/>
  <text x="1235" y="45" text-anchor="middle" fill="#f3e4cd" font-size="16" font-family="Arial,sans-serif">Light mode</text>

  <rect x="0" y="78" width="1400" height="52" fill="#2f2013"/>
  <text x="70" y="111" fill="#f5e9d4" font-size="18" font-family="Arial,sans-serif">📚 128 books</text>
  <text x="300" y="111" fill="#f5e9d4" font-size="18" font-family="Arial,sans-serif">✅ 43 read</text>
  <text x="500" y="111" fill="#f5e9d4" font-size="18" font-family="Arial,sans-serif">📖 12 reading</text>
  <text x="710" y="111" fill="#f5e9d4" font-size="18" font-family="Arial,sans-serif">⭐ 4.3 avg</text>

  <g transform="translate(28,156)">
    <rect width="318" height="44" rx="9" fill="#fff" stroke="#ccb79f"/>
    <text x="16" y="29" fill="#705338" font-size="16" font-family="Arial,sans-serif">All status</text>
  </g>
  <g transform="translate(362,156)">
    <rect width="318" height="44" rx="9" fill="#fff" stroke="#ccb79f"/>
    <text x="16" y="29" fill="#705338" font-size="16" font-family="Arial,sans-serif">All authors</text>
  </g>
  <g transform="translate(696,156)">
    <rect width="318" height="44" rx="9" fill="#fff" stroke="#ccb79f"/>
    <text x="16" y="29" fill="#705338" font-size="16" font-family="Arial,sans-serif">All genres</text>
  </g>
  <g transform="translate(1030,156)">
    <rect width="342" height="44" rx="9" fill="#1a1008" stroke="#1a1008"/>
    <text x="16" y="29" fill="#d4a843" font-size="16" font-family="Arial,sans-serif">📖 Continue reading</text>
  </g>

  <g transform="translate(28,220)">
    <rect width="980" height="44" rx="9" fill="#fff" stroke="#ccb79f"/>
    <text x="16" y="29" fill="#9a866e" font-size="16" font-family="Arial,sans-serif">Search title or author…</text>
  </g>

  <g transform="translate(28,292)">
    <rect width="170" height="256" rx="8" fill="url(#book)"/>
    <rect x="8" y="8" width="154" height="240" rx="6" fill="none" stroke="rgba(255,255,255,.2)"/>
    <rect x="120" y="10" width="44" height="22" rx="4" fill="#5c7a5e"/>
    <text x="142" y="25" text-anchor="middle" fill="#fff" font-size="10" font-family="Arial,sans-serif" font-weight="700">READING</text>
    <text x="18" y="190" fill="#f3dfc0" font-size="22" font-family="Georgia,serif" font-weight="700">The Great</text>
    <text x="18" y="218" fill="#f3dfc0" font-size="22" font-family="Georgia,serif" font-weight="700">Gatsby</text>
  </g>

  <g transform="translate(220,292)">
    <text x="0" y="22" fill="#2f2114" font-size="24" font-family="Georgia,serif" font-weight="700">The Great Gatsby</text>
    <rect x="0" y="38" width="340" height="10" rx="5" fill="#d7c6b3"/>
    <rect x="0" y="38" width="206" height="10" rx="5" fill="url(#progress)"/>
    <text x="0" y="67" fill="#7f684f" font-size="14" font-family="Arial,sans-serif">Page 112 of 180 (62.2%)</text>
    <text x="0" y="93" fill="#8e7151" font-size="17" font-family="Arial,sans-serif">F. Scott Fitzgerald</text>
    <text x="0" y="122" fill="#d4a843" font-size="18" font-family="Arial,sans-serif">★★★★☆ <tspan fill="#9f8567" font-size="14">4.3</tspan></text>
  </g>

  <g transform="translate(28,592)">
    <rect width="170" height="250" rx="8" fill="#6c4e35"/>
    <rect x="220" width="170" height="250" rx="8" fill="#4f6a53"/>
    <rect x="412" width="170" height="250" rx="8" fill="#8b3b24"/>
    <rect x="604" width="170" height="250" rx="8" fill="#4f3824"/>
    <rect x="796" width="170" height="250" rx="8" fill="#7a5c3a"/>
    <rect x="988" width="170" height="250" rx="8" fill="#5c7a5e"/>
    <rect x="1180" width="170" height="250" rx="8" fill="#905f3d"/>
  </g>
